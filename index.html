<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Design Your Chat Robots</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/script.js" defer></script>
</head>
<body>
    <!-- 一个默认窗口 -->
    <div class="window" id="window1">
        <div class="title-bar">
            <div class="buttons">
                <span class="button red"></span>
                <span class="button yellow"></span>
                <span class="button green"></span>
            </div>
            <div class="title">Robot</div>
        </div>
        <div class="content">
            <p>Enter Some Things</p>
        </div>
        <div class="resize-handle bottom-right"></div>
        <div class="resize-handle bottom-left"></div>
        <div class="resize-handle top-right"></div>
        <div class="resize-handle top-left"></div>
        <div class="resize-handle top"></div>
        <div class="resize-handle bottom"></div>
        <div class="resize-handle left"></div>
        <div class="resize-handle right"></div>
        <div class="input-box">
            <textarea id="chat-input" placeholder="请输入消息..."></textarea>
            <div class="resize-handle input"></div>
        </div>
    </div>

    <!-- 左侧面板 -->
    <div class="sidebar" id="sidebar">
        <h3>Windows</h3>
        <!-- + 按钮 -->
        <div class="add-window-button">+</div>
        <div class="window-tabs" id="window-tabs"></div>
    </div>
</body>
</html>
